name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/930478086779/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@showroom-synaptiq-2026.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy showroom \
            --source=. \
            --region=us-west1 \
            --port=8080 \
            --memory=256Mi \
            --min-instances=1 \
            --max-instances=3 \
            --allow-unauthenticated \
            --project=showroom-synaptiq-2026 \
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_INSTANCE }} \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},STORAGE_BACKEND=gcs,GCS_BUCKET=${{ secrets.GCS_BUCKET }},SECRET_KEY=${{ secrets.SECRET_KEY }}"
