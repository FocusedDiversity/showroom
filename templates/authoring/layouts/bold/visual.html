{# Visual / image-driven slide — large image area with optional caption #}
<div class="slide s-visual {% if dark %}dark{% else %}light{% endif %}" data-slide="{{ slide_index }}">
  <div class="top-bar"></div>
  <div class="inner">
    {% if title %}
    <h1>{{ title | safe }}</h1>
    {% endif %}
    <div class="visual-area">
      {% if image_uri %}
      <img src="{{ image_uri }}" alt="{{ title }}">
      {% else %}
      <div class="visual-placeholder">
        <span>Image</span>
      </div>
      {% endif %}
    </div>
    {% if caption %}
    <div class="visual-caption">{{ caption }}</div>
    {% endif %}
    <div class="bot">
      <span class="page-num{% if dark %}-dark{% endif %}">{{ slide_index + 1 }}</span>
    </div>
  </div>
</div>
