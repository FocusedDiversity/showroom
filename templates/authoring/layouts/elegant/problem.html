{# Problem / context slide — two-zone: large statement + supporting context #}
<div class="slide s-problem {% if dark %}dark{% else %}light{% endif %}" data-slide="{{ slide_index }}">
  <div class="top-bar"></div>
  {% if not dark %}
  <div class="left-accent"></div>
  {% else %}
  <div class="glow"></div>
  {% endif %}
  <div class="inner">
    {% if section_label %}
    <div class="section-label">{{ section_label }}</div>
    {% endif %}
    <div class="problem-layout">
      <div class="problem-statement">
        <h1>{{ title | safe }}</h1>
        {% if headline %}
        <div class="problem-headline">{{ headline }}</div>
        {% endif %}
      </div>
      <div class="problem-context">
        {{ body_html | safe }}
      </div>
    </div>
    <div class="bot">
      <span class="page-num{% if dark %}-dark{% endif %}">{{ slide_index + 1 }}</span>
    </div>
  </div>
</div>
