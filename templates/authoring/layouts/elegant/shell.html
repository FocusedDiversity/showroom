<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ deck_title }}</title>
<style>
  {{ font_imports }}

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: {{ font_content }}; background: #000;
  }

  /* ── Nav ── */
  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center; gap: 16px;
    z-index: 1000; border-top: 1px solid rgba(255,255,255,0.08);
  }
  .nav-btn {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: #fff; font-family: {{ font_content }}; font-size: 13px; font-weight: 600;
    padding: 8px 20px; border-radius: 24px; cursor: pointer;
    transition: all 0.2s; user-select: none;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.15); }
  .nav-btn.disabled { opacity: 0.3; pointer-events: none; }
  .slide-indicator { font-size: 13px; font-weight: 500; color: {{ text_muted }}; min-width: 80px; text-align: center; }
  .nav-dots { display: flex; gap: 8px; margin: 0 12px; }
  .nav-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.15); cursor: pointer; transition: all 0.3s;
  }
  .nav-dot.active { background: {{ accent_tertiary }}; transform: scale(1.3); }
  .nav-dot:hover { background: rgba(255,255,255,0.3); }
  .kbd-hint {
    position: fixed; bottom: 64px; right: 20px;
    font-size: 11px; color: {{ text_muted }}; z-index: 1000;
  }
  .kbd-hint kbd {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px; padding: 2px 6px; font-family: {{ font_content }}; font-size: 10px;
  }

  /* ── Deck ── */
  .deck {
    width: 100%; height: calc(100% - 56px); position: relative;
    display: flex; align-items: center; justify-content: center; background: #000;
  }
  .slide-frame {
    width: 1280px; height: 720px; transform-origin: center center; position: relative;
  }
  .slide {
    position: absolute; top: 0; left: 0; width: 1280px; height: 720px;
    opacity: 0; transition: opacity 0.5s ease; pointer-events: none;
    overflow: hidden;
  }
  .slide.active { opacity: 1; pointer-events: auto; }

  /* ── Shared Elements ── */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; height: {{ top_bar_height }};
    background: {{ top_bar_gradient }};
  }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 16px;
  }
  .page-num { font-size: 12px; color: {{ text_muted }}; font-weight: 400; letter-spacing: 0.5px; }
  .page-num-dark { font-size: 12px; color: {{ text_muted }}; font-weight: 400; letter-spacing: 0.5px; }

  /* Decorative flourish — a thin ornamental line used across Elegant slides */
  .flourish {
    width: 48px; height: 1px; margin: 8px 0;
    background: linear-gradient(90deg, {{ accent_primary }}, transparent);
    opacity: 0.4;
  }

  /* ══════════════════════════════════════
     TITLE SLIDE
     ══════════════════════════════════════ */
  .s-title.dark { background: {{ bg_dark }}; color: #fff; }
  .s-title.light { background: {{ bg_light }}; color: {{ text_dark }}; }
  .s-title .grid-overlay {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px;
  }
  .s-title .glow {
    position: absolute; border-radius: 50%; filter: blur(160px);
  }
  .s-title .glow-1 { width: 700px; height: 700px; background: {{ accent_primary }}; top: -250px; right: -150px; opacity: 0.10; }
  .s-title .glow-2 { width: 700px; height: 700px; background: {{ accent_secondary }}; bottom: -300px; left: -200px; opacity: 0.06; }
  .s-title .inner {
    position: relative; z-index: 2; padding: 72px 88px; height: 100%;
    display: flex; flex-direction: column; justify-content: center;
  }
  .s-title .draft-tag {
    font-size: 11px; font-weight: 500; letter-spacing: 3px;
    text-transform: uppercase; color: {{ text_muted }}; margin-bottom: 36px;
    font-family: {{ font_content }};
  }
  .s-title h1 {
    font-size: {{ title_size }}; font-weight: 400; line-height: 1.15;
    letter-spacing: -0.5px; max-width: 780px; margin-bottom: 24px;
    font-family: {{ font_title }};
  }
  .s-title h1 em {
    font-style: normal;
    background: linear-gradient(135deg, {{ accent_tertiary }}, {{ accent_primary }});
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .s-title .subtitle {
    font-size: 20px; font-weight: 300; color: {{ text_muted }};
    max-width: 600px; line-height: 1.6; margin-bottom: 16px;
    font-family: {{ font_content }};
  }
  .s-title .prepared-for {
    font-size: 15px; font-weight: 400; color: {{ text_muted }}; margin-top: 24px;
    font-family: {{ font_content }};
  }
  .s-title .prepared-for strong { color: {{ text_light }}; font-weight: 600; }
  .s-title .aiq-tag {
    display: inline-flex; align-items: center; gap: 10px; margin-top: 20px;
    padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.04);
    font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    color: {{ accent_tertiary }};
  }
  .s-title .collage {
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 55%; z-index: 3;
    display: flex; align-items: center; justify-content: flex-end;
    overflow: hidden;
  }
  .s-title .collage img {
    width: 100%; height: auto;
    object-fit: contain; object-position: right center;
  }
  .s-title .bot {
    position: absolute; bottom: 28px; left: 88px; right: 88px;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .s-title .bot-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .s-title .logo-svg { height: 48px; }

  /* ══════════════════════════════════════
     TEXT SLIDE
     ══════════════════════════════════════ */
  .s-text.dark { background: {{ bg_dark }}; color: #fff; }
  .s-text.light { background: {{ bg_light }}; color: {{ text_dark }}; }
  .s-text .left-accent {
    position: absolute; top: 0; left: 0; width: {{ accent_width }}; height: 100%;
    background: linear-gradient(180deg, {{ accent_primary }}, {{ accent_secondary }});
    opacity: 0.7;
  }
  .s-text .glow {
    position: absolute; width: 600px; height: 600px; border-radius: 50%;
    filter: blur(180px); opacity: 0.07; background: {{ accent_primary }};
    bottom: -250px; left: 50%; transform: translateX(-50%);
  }
  .s-text .inner {
    padding: 60px 88px 52px; height: 100%;
    display: flex; flex-direction: column;
  }
  .s-text.dark .section-label { color: {{ section_label_dark }}; }
  .s-text.light .section-label { color: {{ section_label_light }}; }
  .s-text h1 {
    font-size: {{ h1_size }}; font-weight: 700; line-height: 1.2;
    letter-spacing: -0.3px; margin-bottom: 32px;
    font-family: 'Zilla Slab', serif;
  }
  .s-text h1 em { font-style: normal; color: {{ accent_primary }}; }
  .s-text.dark h1 em {
    background: linear-gradient(135deg, {{ accent_tertiary }}, {{ accent_primary }});
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .s-text .body-content {
    flex: 1; font-size: {{ body_size }}; line-height: 1.8;
    font-family: {{ font_content }};
  }
  .s-text.dark .body-content { color: {{ text_light }}; }
  .s-text.light .body-content { color: {{ text_dark }}; }
  .s-text .body-content p { margin-bottom: 18px; }
  .s-text .body-content strong { color: {{ text_dark }}; }
  .s-text.dark .body-content strong { color: #fff; }
  .s-text .body-content ul, .s-text .body-content ol {
    margin-left: 20px; margin-bottom: 18px;
  }
  .s-text .body-content li { margin-bottom: 10px; }
  .s-text .body-content blockquote {
    border-left: 2px solid {{ accent_tertiary }};
    padding-left: 20px; font-style: italic;
    color: {{ text_muted }}; margin-bottom: 18px;
  }
  .s-text .bot {
    display: flex; justify-content: space-between; align-items: center; margin-top: 32px;
  }
  .s-text .callout {
    font-size: 14px; font-weight: 400; color: {{ text_muted }}; font-style: italic;
    max-width: 750px; line-height: 1.6; padding-left: 20px;
    border-left: 2px solid {{ card_border_light }};
  }

  /* ══════════════════════════════════════
     CARDS SLIDE
     ══════════════════════════════════════ */
  .s-cards.dark { background: {{ bg_dark }}; color: #fff; }
  .s-cards.light { background: {{ bg_light }}; color: {{ text_dark }}; }
  .s-cards .left-accent {
    position: absolute; top: 0; left: 0; width: {{ accent_width }}; height: 100%;
    background: linear-gradient(180deg, {{ accent_primary }}, {{ accent_secondary }});
    opacity: 0.7;
  }
  .s-cards .glow {
    position: absolute; width: 600px; height: 600px; border-radius: 50%;
    filter: blur(180px); opacity: 0.07; background: {{ accent_primary }};
    bottom: -250px; left: 50%; transform: translateX(-50%);
  }
  .s-cards .inner {
    padding: 60px 88px 52px; height: 100%;
    display: flex; flex-direction: column;
  }
  .s-cards.dark .section-label { color: {{ section_label_dark }}; }
  .s-cards.light .section-label { color: {{ section_label_light }}; }
  .s-cards h1 {
    font-size: {{ h1_size }}; font-weight: 700; line-height: 1.2;
    letter-spacing: -0.3px; margin-bottom: 36px;
    font-family: 'Zilla Slab', serif;
  }
  .s-cards h1 em { font-style: normal; color: {{ accent_primary }}; }
  .s-cards .cards { display: flex; gap: 24px; flex: 1; }
  .s-cards.light .card {
    flex: 1; background: {{ card_bg_light }}; border-radius: 24px;
    padding: {{ card_padding }}; display: flex; flex-direction: column;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 12px 32px rgba(0,0,0,0.025);
    border: 1px solid {{ card_border_light }}; position: relative; overflow: hidden;
  }
  .s-cards.dark .card {
    flex: 1; border-radius: 24px; padding: 28px 24px;
    display: flex; flex-direction: column; position: relative;
    overflow: hidden; border: 1px solid {{ card_border_dark }};
    background: {{ card_bg_dark }};
  }
  .s-cards.light .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    opacity: 0.6;
  }
  .s-cards.light .card:nth-child(1)::before { background: {{ accent_primary }}; }
  .s-cards.light .card:nth-child(2)::before { background: {{ accent_secondary }}; }
  .s-cards.light .card:nth-child(3)::before { background: {{ accent_tertiary }}; }
  .s-cards.light .card:nth-child(4)::before { background: {{ accent_primary }}; }
  .s-cards .card-icon {
    width: 44px; height: 44px; border-radius: 22px;
    display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
  }
  .s-cards .card h2 {
    font-size: 16px; font-weight: 700; line-height: 1.3;
    margin-bottom: 14px; font-family: 'Zilla Slab', serif;
  }
  .s-cards.light .card h2 { color: {{ text_dark }}; }
  .s-cards.dark .card h2 { color: #fff; }
  .s-cards.light .card p { font-size: 14px; line-height: 1.7; color: {{ text_dark }}; flex: 1; font-family: {{ font_content }}; }
  .s-cards.dark .card p { font-size: 13px; line-height: 1.6; color: {{ text_muted }}; flex: 1; font-family: {{ font_content }}; }
  .s-cards .card .synaptiq-line {
    margin-top: auto; padding-top: 14px;
    border-top: 1px solid {{ card_border_light }};
    font-size: 13px; font-weight: 600; color: {{ accent_primary }}; line-height: 1.5;
  }
  .s-cards .bot {
    display: flex; justify-content: space-between; align-items: center; margin-top: 32px;
  }

  /* ══════════════════════════════════════
     STATS SLIDE
     ══════════════════════════════════════ */
  .s-stats.dark { background: {{ bg_dark }}; color: #fff; }
  .s-stats.light { background: {{ bg_light }}; color: {{ text_dark }}; }
  .s-stats .left-accent {
    position: absolute; top: 0; left: 0; width: {{ accent_width }}; height: 100%;
    background: linear-gradient(180deg, {{ accent_primary }}, {{ accent_secondary }});
    opacity: 0.7;
  }
  .s-stats .glow {
    position: absolute; border-radius: 50%; filter: blur(160px);
  }
  .s-stats .glow-1 { width: 600px; height: 600px; background: {{ accent_secondary }}; top: -150px; right: -150px; opacity: 0.06; }
  .s-stats .glow-2 { width: 600px; height: 600px; background: {{ accent_primary }}; bottom: -250px; left: 150px; opacity: 0.06; }
  .s-stats .inner {
    padding: 60px 88px 52px; height: 100%;
    display: flex; flex-direction: column;
  }
  .s-stats.dark .section-label { color: {{ section_label_dark }}; }
  .s-stats.light .section-label { color: {{ section_label_light }}; }
  .s-stats h1 {
    font-size: {{ h1_size }}; font-weight: 700; line-height: 1.2;
    letter-spacing: -0.3px; margin-bottom: 36px;
    font-family: 'Zilla Slab', serif;
  }
  .s-stats .stats-grid {
    display: flex; gap: 28px; flex: 1; align-items: center;
  }
  .s-stats .stat-card {
    flex: 1; text-align: center; padding: {{ card_padding }};
    border-radius: 24px;
  }
  .s-stats.light .stat-card {
    background: {{ card_bg_light }};
    box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 12px 32px rgba(0,0,0,0.025);
    border: 1px solid {{ card_border_light }};
  }
  .s-stats.dark .stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid {{ card_border_dark }};
  }
  .s-stats .stat-value {
    font-size: 46px; font-weight: 400; line-height: 1;
    margin-bottom: 14px; font-family: {{ font_title }};
  }
  .s-stats.light .stat-value { color: {{ accent_primary }}; }
  .s-stats.dark .stat-value {
    background: linear-gradient(135deg, {{ accent_tertiary }}, {{ accent_primary }});
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .s-stats .stat-label {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 10px;
    font-family: {{ font_content }};
  }
  .s-stats .stat-desc {
    font-size: 13px; line-height: 1.6;
    font-family: {{ font_content }};
  }
  .s-stats.light .stat-desc { color: {{ text_dark }}; }
  .s-stats.dark .stat-desc { color: {{ text_muted }}; }
  .s-stats .bot {
    display: flex; justify-content: space-between; align-items: center; margin-top: 32px;
  }

  /* ══════════════════════════════════════
     TIMELINE SLIDE
     ══════════════════════════════════════ */
  .s-timeline.dark { background: {{ bg_dark }}; color: #fff; }
  .s-timeline.light { background: {{ bg_light }}; color: {{ text_dark }}; }
  .s-timeline .left-accent {
    position: absolute; top: 0; left: 0; width: {{ accent_width }}; height: 100%;
    background: linear-gradient(180deg, {{ accent_primary }}, {{ accent_secondary }});
    opacity: 0.7;
  }
  .s-timeline .glow {
    position: absolute; width: 600px; height: 600px; border-radius: 50%;
    filter: blur(180px); opacity: 0.07; background: {{ accent_primary }};
    bottom: -250px; left: 50%; transform: translateX(-50%);
  }
  .s-timeline .inner {
    padding: 56px 88px 48px; height: 100%;
    display: flex; flex-direction: column;
  }
  .s-timeline.dark .section-label { color: {{ section_label_dark }}; }
  .s-timeline.light .section-label { color: {{ section_label_light }}; }
  .s-timeline h1 {
    font-size: 32px; font-weight: 700; line-height: 1.2;
    letter-spacing: -0.3px; margin-bottom: 32px;
    font-family: 'Zilla Slab', serif;
  }
  .s-timeline h1 em {
    font-style: normal;
    background: linear-gradient(135deg, {{ accent_tertiary }}, {{ accent_primary }});
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .s-timeline .timeline-full { display: flex; flex-direction: column; gap: 14px; flex: 1; }
  .s-timeline .phase { flex: 1; display: flex; gap: 18px; align-items: stretch; }
  .s-timeline .phase-ind {
    display: flex; flex-direction: column; align-items: center;
    width: 44px; flex-shrink: 0;
  }
  .s-timeline .phase-dot {
    width: 36px; height: 36px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .s-timeline.dark .phase:nth-child(1) .phase-dot { background: rgba(161,184,202,0.2); color: {{ accent_primary }}; }
  .s-timeline.dark .phase:nth-child(2) .phase-dot { background: rgba(139,168,189,0.2); color: {{ accent_tertiary }}; }
  .s-timeline.dark .phase:nth-child(3) .phase-dot { background: rgba(247,207,165,0.2); color: {{ text_light }}; }
  .s-timeline.dark .phase:nth-child(4) .phase-dot { background: rgba(161,184,202,0.2); color: {{ accent_primary }}; }
  .s-timeline.light .phase-dot { background: rgba(161,184,202,0.10); color: {{ accent_primary }}; }
  .s-timeline .phase-line { flex: 1; width: 1px; background: rgba(255,255,255,0.06); margin: 4px auto; }
  .s-timeline.light .phase-line { background: {{ card_border_light }}; }
  .s-timeline .phase-content {
    flex: 1; border-radius: 24px; padding: 20px 24px;
  }
  .s-timeline.dark .phase-content {
    background: rgba(255,255,255,0.03);
    border: 1px solid {{ card_border_dark }};
  }
  .s-timeline.light .phase-content {
    background: {{ card_bg_light }};
    border: 1px solid {{ card_border_light }};
    box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 8px 24px rgba(0,0,0,0.02);
  }
  .s-timeline .phase-weeks {
    font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: {{ accent_tertiary }}; margin-bottom: 4px;
  }
  .s-timeline .phase-title {
    font-size: 16px; font-weight: 700; margin-bottom: 6px;
    font-family: 'Zilla Slab', serif;
  }
  .s-timeline .phase-desc {
    font-size: 12.5px; line-height: 1.6; margin-bottom: 8px;
    font-family: {{ font_content }};
  }
  .s-timeline.dark .phase-desc { color: {{ text_muted }}; }
  .s-timeline.light .phase-desc { color: {{ text_dark }}; }
  .s-timeline .phase-quick-win {
    font-size: 12px; font-weight: 600; color: {{ accent_tertiary }};
    padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.04); line-height: 1.4;
  }
  .s-timeline .bot {
    display: flex; justify-content: space-between; align-items: center; margin-top: 16px;
  }

  /* ══════════════════════════════════════
     SPLIT SLIDE
     ══════════════════════════════════════ */
  .s-split.dark { background: {{ bg_dark }}; color: #fff; }
  .s-split.light { background: {{ bg_light }}; color: {{ text_dark }}; }
  .s-split .left-accent {
    position: absolute; top: 0; left: 0; width: {{ accent_width }}; height: 100%;
    background: linear-gradient(180deg, {{ accent_primary }}, {{ accent_secondary }});
    opacity: 0.7;
  }
  .s-split .glow {
    position: absolute; width: 600px; height: 600px; border-radius: 50%;
    filter: blur(180px); opacity: 0.07; background: {{ accent_primary }};
    bottom: -250px; left: 50%; transform: translateX(-50%);
  }
  .s-split .inner {
    padding: 60px 88px 52px; height: 100%;
    display: flex; flex-direction: column;
  }
  .s-split.dark .section-label { color: {{ section_label_dark }}; }
  .s-split.light .section-label { color: {{ section_label_light }}; }
  .s-split h1 {
    font-size: {{ h1_size }}; font-weight: 700; line-height: 1.2;
    letter-spacing: -0.3px; margin-bottom: 32px;
    font-family: 'Zilla Slab', serif;
  }
  .s-split .split-layout { display: flex; gap: 44px; flex: 1; }
  .s-split .split-left {
    flex: 1; font-size: 15px; line-height: 1.8;
    font-family: {{ font_content }};
  }
  .s-split.dark .split-left { color: {{ text_light }}; }
  .s-split.light .split-left { color: {{ text_dark }}; }
  .s-split .split-left p { margin-bottom: 18px; }
  .s-split .split-right {
    flex: 1; display: flex; align-items: center; justify-content: center;
  }
  .s-split .split-right blockquote {
    font-size: 20px; font-style: italic; line-height: 1.6;
    padding: 32px 36px; border-radius: 24px;
    border-left: 3px solid {{ accent_tertiary }};
    font-family: {{ font_content }};
  }
  .s-split.dark .split-right blockquote { background: rgba(255,255,255,0.03); color: {{ text_light }}; }
  .s-split.light .split-right blockquote { background: {{ card_bg_light }}; color: {{ text_dark }}; border: 1px solid {{ card_border_light }}; }
  .s-split .bot {
    display: flex; justify-content: space-between; align-items: center; margin-top: 32px;
  }

  /* ══════════════════════════════════════
     CLOSING SLIDE
     ══════════════════════════════════════ */
  .s-closing.dark { background: {{ bg_dark }}; color: #fff; }
  .s-closing.light { background: {{ bg_light }}; color: {{ text_dark }}; }
  .s-closing .glow {
    position: absolute; width: 800px; height: 800px; border-radius: 50%;
    filter: blur(200px); opacity: 0.08; background: {{ accent_primary }};
    top: 50%; left: 50%; transform: translate(-50%,-50%);
  }
  .s-closing .inner {

<body>

<div class="deck">
  <div class="slide-frame" id="slideFrame">
    {{ slides_html | safe }}
  </div>
</div>

<div class="nav-bar">
  <button class="nav-btn" id="prevBtn" onclick="go(-1)">&larr; Prev</button>
  <div class="nav-dots" id="navDots"></div>
  <span class="slide-indicator" id="slideNum">1 / {{ total_slides }}</span>
  <button class="nav-btn" id="nextBtn" onclick="go(1)">Next &rarr;</button>
</div>
<div class="kbd-hint"><kbd>&larr;</kbd> <kbd>&rarr;</kbd> or click to navigate</div>

<script>
(function() {
  var slides = document.querySelectorAll('.slide');
  var cur = 0;
  var total = slides.length;
  var dotsEl = document.getElementById('navDots');
  var numEl = document.getElementById('slideNum');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  // Build dots
  for (var i = 0; i < total; i++) {
    var dot = document.createElement('div');
    dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
    dot.dataset.idx = i;
    dot.onclick = function() { goTo(parseInt(this.dataset.idx)); };
    dotsEl.appendChild(dot);
  }

  function goTo(n) {
    if (n < 0 || n >= total) return;
    slides[cur].classList.remove('active');
    dotsEl.children[cur].classList.remove('active');
    cur = n;
    slides[cur].classList.add('active');
    dotsEl.children[cur].classList.add('active');
    numEl.textContent = (cur + 1) + ' / ' + total;
    prevBtn.className = 'nav-btn' + (cur === 0 ? ' disabled' : '');
    nextBtn.className = 'nav-btn' + (cur === total - 1 ? ' disabled' : '');
  }

  window.go = function(d) { goTo(cur + d); };
  goTo(0);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
  });

  // Click to advance
  document.querySelector('.slide-frame').addEventListener('click', function(e) {
    if (!e.target.closest('.nav-bar') && !e.target.closest('a') && !e.target.closest('button')) {
      go(1);
    }
  });

  // Responsive scaling
  function scale() {
    var frame = document.getElementById('slideFrame');
    var deck = frame.parentElement;
    var sx = deck.clientWidth / 1280;
    var sy = deck.clientHeight / 720;
    var s = Math.min(sx, sy, 1);
    frame.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', scale);
  scale();
})();
</script>
</body>
</html>
