{% extends "base.html" %}
{% block title %}{{ title }} - Showroom{% endblock %}

{% block body %}
<div class="viewer-page">
    <div class="gate-card">
        <div class="gate-logo">
            <img src="{{ url_for('static', filename='img/showroom-logo-final.png') }}" alt="Showroom" class="gate-logo-img">
        </div>
        <h1 class="gate-title">{{ title }}</h1>
        <p class="gate-subtitle">Enter your email to view this document.</p>

        {% if error %}
        <div class="flash flash-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="gate-form">
            <div class="form-group">
                <input type="email" name="email" required placeholder="you@company.com"
                       class="input-large" autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-large btn-full">Continue</button>
        </form>
        <div class="gate-footer">
            <span class="powered-label">Powered by</span>
            <img src="{{ url_for('static', filename='img/synaptiq-logo-color.svg') }}" alt="Synaptiq" class="powered-logo">
        </div>
    </div>
</div>
{% endblock %}
