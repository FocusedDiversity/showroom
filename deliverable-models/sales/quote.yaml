# Synaptiq Quote Template
# Extracted from: Quote Template - 2025.xlsx

quote:
  buyer:
    name: ""
    email: ""
    job_title: ""
    company: ""

  project_title: ""
  last_updated_date: ""

  business_problem:
    ""
    # Describe the problem the client is trying to solve including the audience,
    # pain the client will incur if they do not solve the problem,
    # how common the problem is, etc.

  use_case:
    ""
    # Explain the use case of the ideal solution to solve this problem
    # that starts with "As a [actor], I will..."

  service:
    ""
    # Select from service_catalog below

  measurable_business_results:
    # Enumerate a list of business results expected
    - ""

  acceptance_criteria:
    # Enumerate a list of criteria required to meet the client's expectations
    - ""

  assumptions:
    # Enumerate a list of assumptions required for the project to be successful
    - ""

  proposed_schedule:
    # Name and map each task to the week(s) it spans
    tasks:
      - name: "Example Task 1"
        weeks: []
      - name: "Example Task 2"
        weeks: []
    total_weeks: 4

  calculated_price:
    # Select one or more items from service_catalog below and specify the
    # period (number of months) for each. The total quote price is the sum
    # of (unit_price × period) for all selected line items.
    line_items:
      - sku: ""
        period_months: 1
    total: ""

  commission_payout: ""

  quote_validity_days: 30
  backlog_period: "2 - 4 weeks"
  note: >
    Once the quote is approved, Synaptiq will initiate the contract process.
    When the contract is fully executed and the initial payment is received,
    Synaptiq will assign resources and schedule a kick-off call when they
    are available to start work.

